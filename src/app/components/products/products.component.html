<h1>
    Pokemon Item Mart
    </h1>
    
    <p class="subtitle">
        Choose your trainer supplies!
        </p>
    
    <div class="products">
    
    
    @for(item of shop.items(); track item.id){
    
    
    <app-product-card
    
    [product]="item"
    
    (add)="addProduct($event)"
    
    >
    
    
    </app-product-card>
    
    
    }
    
    
    </div>
